{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Changed | Buy2Express</title>
    <link rel="stylesheet" href="{% static 'css/all.min.css' %}">
    <style>
        *, *::before, *::after {
            margin: 0; padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        :root {
            --primary:        #F5A623;
            --primary-dark:   #E09518;
            --primary-light:  #FFC85A;
            --secondary:      #1A1D2E;
            --secondary-soft: #252840;
            --accent:         #6C63FF;
            --success:        #00875A;
            --bg-page:        #F5F4F0;
            --bg-card:        #FFFFFF;
            --text-dark:      #1A1D2E;
            --text-muted:     #7B7E92;
            --border:         #E8E7E2;
            --shadow-lg:      0 16px 40px rgba(26,29,46,0.16);
            --transition:     all 0.3s cubic-bezier(0.4,0,0.2,1);
        }

        html { scroll-behavior: smooth; }

        body {
            min-height: 100vh;
            background: var(--bg-page);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
            position: relative;
            overflow-x: hidden;
        }

        body::before, body::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }
        body::before {
            width: 520px; height: 520px;
            top: -160px; left: -160px;
            background: radial-gradient(circle, rgba(245,166,35,0.10) 0%, transparent 70%);
        }
        body::after {
            width: 400px; height: 400px;
            bottom: -120px; right: -120px;
            background: radial-gradient(circle, rgba(108,99,255,0.08) 0%, transparent 70%);
        }

        .card {
            width: 100%;
            max-width: 440px;
            background: var(--bg-card);
            border-radius: 20px;
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            position: relative;
            z-index: 1;
            animation: cardUp 0.55s cubic-bezier(0.34,1.2,0.64,1) both;
            border: 1px solid var(--border);
            margin: auto;
        }
        @keyframes cardUp {
            from { opacity: 0; transform: translateY(32px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0)    scale(1); }
        }

        .card-header {
            background: var(--secondary);
            padding: 32px 32px 28px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .card-header::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--accent), var(--primary));
            background-size: 200%;
            animation: shimmer 3s linear infinite;
        }
        @keyframes shimmer {
            from { background-position: 200% center; }
            to   { background-position: -200% center; }
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            color: white;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 6px;
            text-decoration: none;
        }
        .logo span { color: var(--primary); }
        .logo i {
            color: var(--primary);
            font-size: 24px;
        }

        .card-header p {
            color: rgba(255,255,255,0.65);
            font-size: 14px;
            letter-spacing: 0.2px;
        }

        .card-body {
            padding: 40px 32px;
            text-align: center;
        }

        .success-icon {
            width: 76px;
            height: 76px;
            margin: 0 auto 22px;
            border-radius: 50%;
            background: #f0fff8;
            border: 2px solid var(--success);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: var(--success);
            animation: popIn 0.5s cubic-bezier(0.34,1.6,0.64,1) both;
        }
        @keyframes popIn {
            from { opacity: 0; transform: scale(0.5); }
            to   { opacity: 1; transform: scale(1); }
        }

        .card-body h2 {
            font-size: 20px;
            color: var(--text-dark);
            margin-bottom: 10px;
        }

        .card-body p.desc {
            color: var(--text-muted);
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 28px;
        }

        .btn-submit {
            display: block;
            width: 100%;
            padding: 14px;
            background: var(--secondary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
            letter-spacing: 0.3px;
        }
        .btn-submit::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .btn-submit:hover::after { opacity: 1; }
        .btn-submit span { position: relative; z-index: 1; }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(245,166,35,0.35); }
        .btn-submit:active { transform: translateY(0); }

        @media (max-width: 480px) {
            .card-body, .card-header { padding-left: 20px; padding-right: 20px; }
        }
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.1ms !important; }
        }
    </style>
</head>
<body>

<div class="card">
    <div class="card-header">
        <a href="{% url 'home' %}" class="logo">
            <i class="fas fa-shopping-bag"></i>
            Buy2<span>Express</span>
        </a>
        <p>Account recovery</p>
    </div>

    <div class="card-body">

        <div class="success-icon">
            <i class="fas fa-check"></i>
        </div>

        <h2>Password Updated</h2>
        <p class="desc">
            Your password has been changed successfully. You can now log in
            with your new password.
        </p>

        <a href="{% url 'authentication:login' %}" class="btn-submit">
            <span>Login Now</span>
        </a>

    </div>
</div>

</body>
</html>
