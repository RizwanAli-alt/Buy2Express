{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | Buy2Express</title>

    <style>
        body{
            font-family:Arial,sans-serif;
            background:#f5f5f5;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            margin:0;
        }

        .card{
            background:white;
            width:400px;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,.1);
        }

        h2{
            text-align:center;
            margin-bottom:20px;
        }

        p{
            color:#666;
            font-size:14px;
        }

        input{
            width:100%;
            padding:12px;
            margin-top:15px;
            margin-bottom:20px;
            border:1px solid #ccc;
            border-radius:5px;
            box-sizing:border-box;
        }

        button{
            width:100%;
            padding:12px;
            border:none;
            background:#f5a623;
            color:white;
            font-size:16px;
            border-radius:5px;
            cursor:pointer;
        }

        button:hover{
            opacity:.9;
        }

        a{
            display:block;
            text-align:center;
            margin-top:15px;
            text-decoration:none;
        }
    </style>
</head>
<body>

<div class="card">

    <h2>Forgot Password</h2>

    <p>
        Enter your email address below and we'll send you instructions
        to reset your password.
    </p>

    <form method="post">
        {% csrf_token %}
        {{ form.email }}
        <button type="submit">
            Send Reset Link
        </button>
    </form>

    <a href="{% url 'authentication:login' %}">
        Back to Login
    </a>

</div>

</body>
</html>
