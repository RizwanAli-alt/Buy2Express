{% extends 'base.html' %}
{% block title %}Category Form | Buy2Express{% endblock %}
{% block content %}
<style>
    .form-shell {
        max-width: 720px;
        margin: 30px auto 60px;
        padding: 0 24px;
    }
    .form-panel {
        background: var(--bg-card);
        border-radius: 20px;
        box-shadow: var(--shadow-md);
        overflow: hidden;
        border: 1px solid var(--border);
        animation: cardReveal 0.5s cubic-bezier(0.4,0,0.2,1) both;
    }
    .form-header {
        padding: 30px 36px;
        background: linear-gradient(135deg, var(--secondary) 0%, var(--secondary-soft) 70%);
        color: white;
        position: relative;
        overflow: hidden;
    }
    .form-header::before {
        content: '';
        position: absolute;
        top: -50%;
        right: -8%;
        width: 220px;
        height: 220px;
        background: radial-gradient(circle, rgba(245,166,35,0.2), transparent 70%);
        border-radius: 50%;
    }
    .form-header h1 {
        font-size: 22px;
        font-weight: 800;
        position: relative;
        z-index: 1;
        display: flex;
        align-items: center;
        gap: 10px;
    }
    .form-header p {
        color: rgba(255,255,255,0.65);
        font-size: 13.5px;
        margin-top: 6px;
        position: relative;
        z-index: 1;
    }

    .form-body { padding: 32px 36px; }

    .form-body p { margin-bottom: 20px; }
    .form-body label {
        display: block;
        margin-bottom: 7px;
        font-weight: 600;
        font-size: 13.5px;
        color: var(--text-dark);
        letter-spacing: 0.2px;
    }
    .form-body input,
    .form-body select,
    .form-body textarea {
        width: 100%;
        padding: 12px 14px;
        border: 1.5px solid var(--border);
        border-radius: 10px;
        font-size: 14px;
        color: var(--text-dark);
        background: #fcfbfa;
        transition: var(--transition-fast);
        font-family: inherit;
    }
    .form-body textarea { resize: vertical; min-height: 100px; }
    .form-body input:focus,
    .form-body select:focus,
    .form-body textarea:focus {
        outline: none;
        border-color: var(--primary);
        background: white;
        box-shadow: 0 0 0 4px rgba(245,166,35,0.12);
    }
    .form-body input[type="checkbox"] { width: auto; }
    .form-body ul.errorlist {
        list-style: none;
        color: #c0392b;
        font-size: 12.5px;
        margin-top: 6px;
    }

    .form-actions {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-top: 28px;
        padding-top: 22px;
        border-top: 1px solid var(--border);
    }
    .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        border-radius: 10px;
        padding: 13px 22px;
        text-decoration: none;
        font-weight: 600;
        font-size: 14px;
        cursor: pointer;
        border: none;
        transition: var(--transition-fast);
    }
    .btn-primary {
        background: var(--primary);
        color: var(--secondary);
        box-shadow: var(--shadow-sm);
    }
    .btn-primary:hover {
        background: var(--primary-dark);
        transform: translateY(-2px);
        box-shadow: var(--shadow-md);
    }
    .btn-primary:active { transform: translateY(0) scale(0.98); }
    .btn-soft {
        background: #f1efe9;
        color: var(--text-dark);
    }
    .btn-soft:hover { background: #e8e6e0; }
</style>

<div class="form-shell">
    <div class="form-panel">
        <div class="form-header">
            <h1><i class="fas fa-tag" aria-hidden="true"></i> Category Details</h1>
            <p>Define how this category appears across the storefront.</p>
        </div>
        <div class="form-body">
            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}
                {{ form.as_p }}
                <div class="form-actions">
                    <button class="btn btn-primary" type="submit">
                        <i class="fas fa-check" aria-hidden="true"></i> Save Category
                    </button>
                    <a class="btn btn-soft" href="{% url 'product_management:category_list' %}">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
