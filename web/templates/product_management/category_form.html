{% extends 'base.html' %}
{% block title %}Category Form | Buy2Express{% endblock %}
{% block content %}
<style>
    .shell { max-width: 860px; margin: 0 auto; padding: 32px 20px 0; }
    .panel { background: white; border-radius: 24px; box-shadow: 0 14px 35px rgba(0,0,0,0.08); overflow: hidden; }
    .panel-header { padding: 28px 32px; background: linear-gradient(135deg, #ff4747, #ff7676); color: white; }
    .panel-body { padding: 32px; }
    .field { margin-bottom: 18px; }
    label { display:block; margin-bottom: 8px; font-weight: 700; }
    input, select, textarea { width: 100%; padding: 13px 14px; border: 1px solid #e8e8e8; border-radius: 12px; }
    .actions { display:flex; gap: 12px; flex-wrap: wrap; margin-top: 24px; }
    .btn { display: inline-flex; align-items: center; justify-content: center; border-radius: 12px; padding: 13px 18px; text-decoration: none; font-weight: 700; cursor: pointer; border:none; }
    .btn-primary { background: linear-gradient(135deg, #ff4747, #ff7676); color: white; }
    .btn-soft { background: #f3f4f6; color: #222; }
</style>
<div class="shell">
    <div class="panel">
        <div class="panel-header"><h1>Category</h1></div>
        <div class="panel-body">
            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}
                {{ form.as_p }}
                <div class="actions">
                    <button class="btn btn-primary" type="submit">Save Category</button>
                    <a class="btn btn-soft" href="{% url 'product_management:category_list' %}">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
