{% extends 'base.html' %}
{% block title %}Brands | Buy2Express{% endblock %}
{% block content %}
<style>
    .shell { max-width: 1100px; margin: 0 auto; padding: 32px 20px 0; }
    .hero { background: linear-gradient(135deg, #ff4747, #ff7676); color: white; border-radius: 24px; padding: 32px; margin-bottom: 24px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 18px; }
    .card { background: white; border-radius: 18px; padding: 22px; box-shadow: 0 10px 28px rgba(0,0,0,0.08); }
    .actions { margin-top: 16px; display: flex; gap: 10px; flex-wrap: wrap; }
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; border-radius: 12px; padding: 11px 14px; text-decoration: none; font-weight: 700; }
    .btn-primary { background: linear-gradient(135deg, #ff4747, #ff7676); color: white; }
    .btn-soft { background: #f3f4f6; color: #222; }
</style>
<div class="shell">
    <div class="hero">
        <h1>Brands</h1>
        <p>Manage trusted labels in the storefront.</p>
    </div>
    <p><a class="btn btn-primary" href="{% url 'product_management:brand_create' %}">Add Brand</a></p>
    <div class="grid" style="margin-top: 18px;">
        {% for brand in brands %}
        <div class="card">
            <h3>{{ brand.name }}</h3>
            <div class="actions">
                <a class="btn btn-soft" href="{% url 'product_management:brand_update' brand.pk %}">Edit</a>
                <a class="btn btn-soft" href="{% url 'product_management:brand_delete' brand.pk %}">Delete</a>
            </div>
        </div>
        {% empty %}
        <div class="card">No brands found.</div>
        {% endfor %}
    </div>
</div>
{% endblock %}
