{% extends 'base.html' %}
{% block title %}Delete Brand | Buy2Express{% endblock %}
{% block content %}
<style>
    .shell { max-width: 720px; margin: 0 auto; padding: 32px 20px 0; }
    .panel { background: white; border-radius: 24px; box-shadow: 0 14px 35px rgba(0,0,0,0.08); overflow: hidden; }
    .panel-header { padding: 28px 32px; background: linear-gradient(135deg, #ff4747, #ff7676); color: white; }
    .panel-body { padding: 32px; }
    .actions { display:flex; gap: 12px; flex-wrap: wrap; margin-top: 24px; }
    .btn { display: inline-flex; align-items: center; justify-content: center; border-radius: 12px; padding: 13px 18px; text-decoration: none; font-weight: 700; border:none; cursor:pointer; }
    .btn-danger { background: #d63031; color: white; }
    .btn-soft { background: #f3f4f6; color: #222; }
</style>
<div class="shell">
    <div class="panel">
        <div class="panel-header"><h1>Delete Brand</h1></div>
        <div class="panel-body">
            <p>Delete <strong>{{ brand.name }}</strong>?</p>
            <form method="post">
                {% csrf_token %}
                <div class="actions">
                    <button class="btn btn-danger" type="submit">Yes, delete</button>
                    <a class="btn btn-soft" href="{% url 'product_management:brand_list' %}">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
