{% extends 'base.html' %}
{% block title %}Payment Success | Buy2Express{% endblock %}
{% block content %}
<style>
    .shell { max-width: 760px; margin: 0 auto; padding: 32px 20px 0; }
    .panel { background:white; border-radius:20px; box-shadow:0 10px 28px rgba(0,0,0,0.08); overflow:hidden; text-align:center; }
    .header { background: linear-gradient(135deg, #ff4747, #ff7676); color:white; padding: 28px 32px; }
    .body { padding: 32px; }
    .btn { display:inline-flex; align-items:center; justify-content:center; border-radius:12px; padding:12px 16px; text-decoration:none; font-weight:700; border:none; cursor:pointer; }
    .btn-primary { background: linear-gradient(135deg, #ff4747, #ff7676); color:white; }
</style>
<div class="shell">
    <div class="panel">
        <div class="header">
            <h1>Payment complete</h1>
        </div>
        <div class="body">
            <p>Your payment has been processed successfully.</p>
            <p style="margin-top:18px;"><a class="btn btn-primary" href="{% url 'cart_and_orders:orders' %}">View orders</a></p>
        </div>
    </div>
</div>
{% endblock %}
