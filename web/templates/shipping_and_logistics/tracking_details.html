{% extends 'base.html' %}
{% block title %}Tracking Details | Buy2Express{% endblock %}
{% block content %}
<style>
    .shell { max-width: 820px; margin: 0 auto; padding: 32px 20px 0; }
    .panel { background:white; border-radius:20px; box-shadow:0 10px 28px rgba(0,0,0,0.08); overflow:hidden; }
    .header { background: linear-gradient(135deg, #ff4747, #ff7676); color:white; padding: 28px 32px; }
    .body { padding: 32px; }
    .meta { color:#666; margin-bottom:10px; }
</style>
<div class="shell">
    <div class="panel">
        <div class="header">
            <h1>Tracking Details</h1>
        </div>
        <div class="body">
            <p class="meta"><strong>Order:</strong> #{{ details.order.id }}</p>
            <p class="meta"><strong>Status:</strong> {{ details.status }}</p>
            <p class="meta"><strong>Tracking Number:</strong> {{ details.tracking_number|default:'Not assigned yet' }}</p>
        </div>
    </div>
</div>
{% endblock %}
