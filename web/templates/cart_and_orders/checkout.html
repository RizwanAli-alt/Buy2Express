{% extends 'base.html' %}
{% block title %}Checkout | Buy2Express{% endblock %}
{% block content %}
<style>
    .shell { max-width: 900px; margin: 0 auto; padding: 32px 20px 0; }
    .panel { background: white; border-radius: 20px; box-shadow: 0 10px 28px rgba(0,0,0,0.08); overflow: hidden; }
    .header { background: linear-gradient(135deg, #ff4747, #ff7676); color: white; padding: 28px 32px; }
    .body { padding: 32px; }
    .field { margin-bottom: 18px; }
    label { display:block; margin-bottom: 8px; font-weight: 700; }
    input, textarea { width: 100%; padding: 13px 14px; border: 1px solid #e8e8e8; border-radius: 12px; }
    textarea { min-height: 120px; }
    .btn { display: inline-flex; align-items: center; justify-content: center; border-radius: 12px; padding: 12px 16px; text-decoration: none; font-weight: 700; border: none; cursor: pointer; }
    .btn-primary { background: linear-gradient(135deg, #ff4747, #ff7676); color: white; }
    .btn-soft { background: #f3f4f6; color: #222; }
    .summary { background: #fafafa; padding: 18px; border-radius: 16px; margin-bottom: 20px; }
    .summary-row { display:flex; justify-content: space-between; margin-bottom: 10px; }
    .actions { margin-top: 18px; display:flex; gap: 10px; flex-wrap: wrap; }
</style>
<div class="shell">
    <div class="panel">
        <div class="header">
            <h1>Checkout</h1>
        </div>
        <div class="body">
            <div class="summary">
                <div class="summary-row"><span>Cart items</span><span>{{ cart_items|length }}</span></div>
                <div class="summary-row"><span>Estimated total</span><span>${{ cart.get_total_price }}</span></div>
            </div>
            <form method="post">
                {% csrf_token %}
                <div class="field">
                    <label for="id_shipping_address">Shipping address</label>
                    {{ form.shipping_address }}
                </div>
                <div class="field">
                    <label for="id_billing_address">Billing address</label>
                    {{ form.billing_address }}
                </div>
                <div class="actions">
                    <button class="btn btn-primary" type="submit">Place Order</button>
                    <a class="btn btn-soft" href="{% url 'cart_and_orders:cart_view' %}">Back to cart</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
