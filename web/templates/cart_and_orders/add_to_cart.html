{% extends 'base.html' %}
{% block title %}Add to Cart | Buy2Express{% endblock %}
{% block content %}
<style>
    .shell { max-width: 820px; margin: 0 auto; padding: 32px 20px 0; }
    .panel { background: white; border-radius: 20px; box-shadow: 0 10px 28px rgba(0,0,0,0.08); overflow: hidden; }
    .header { background: linear-gradient(135deg, #ff4747, #ff7676); color: white; padding: 28px 32px; }
    .body { padding: 32px; }
    .field { margin-bottom: 18px; }
    label { display:block; margin-bottom: 8px; font-weight: 700; }
    input, select { width: 100%; padding: 13px 14px; border: 1px solid #e8e8e8; border-radius: 12px; }
    .btn { display: inline-flex; align-items: center; justify-content: center; border-radius: 12px; padding: 12px 16px; text-decoration: none; font-weight: 700; border: none; cursor: pointer; }
    .btn-primary { background: linear-gradient(135deg, #ff4747, #ff7676); color: white; }
    .btn-soft { background: #f3f4f6; color: #222; }
    .actions { margin-top: 18px; display:flex; gap: 10px; flex-wrap: wrap; }
</style>
<div class="shell">
    <div class="panel">
        <div class="header">
            <h1>Add {{ product.name }} to Cart</h1>
        </div>
        <div class="body">
            <form method="post">
                {% csrf_token %}
                <div class="field">
                    <label for="id_variant">Variant</label>
                    {{ form.variant }}
                </div>
                <div class="field">
                    <label for="id_quantity">Quantity</label>
                    {{ form.quantity }}
                </div>
                <div class="actions">
                    <button class="btn btn-primary" type="submit">Add to Cart</button>
                    <a class="btn btn-soft" href="{% url 'product_management:products' %}">Back to products</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
