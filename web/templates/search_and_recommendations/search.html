{% extends 'base.html' %}
{% block title %}Search | Buy2Express{% endblock %}
{% block content %}
<style>
    .shell { max-width: 900px; margin: 0 auto; padding: 32px 20px 0; }
    .panel { background:white; border-radius:20px; box-shadow:0 10px 28px rgba(0,0,0,0.08); overflow:hidden; }
    .header { background: linear-gradient(135deg, #ff4747, #ff7676); color:white; padding: 28px 32px; }
    .body { padding: 32px; }
    .field { margin-bottom: 18px; }
    input { width:100%; padding:13px 14px; border:1px solid #e8e8e8; border-radius:12px; }
    .btn { display:inline-flex; align-items:center; justify-content:center; gap:8px; border-radius:12px; padding:12px 16px; text-decoration:none; font-weight:700; border:none; cursor:pointer; }
    .btn-primary { background: linear-gradient(135deg, #ff4747, #ff7676); color:white; }
</style>
<div class="shell">
    <div class="panel">
        <div class="header"><h1>Search Products</h1></div>
        <div class="body">
            <form method="post">
                {% csrf_token %}
                <div class="field">
                    <input type="text" name="query" placeholder="Search for products, brands, or categories">
                </div>
                <button class="btn btn-primary" type="submit">Search</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
