{% extends 'base.html' %}
{% block title %}Delete Review | Buy2Express{% endblock %}
{% block content %}
<style>
    .rvd-shell { max-width: 560px; margin: 60px auto 80px; padding: 0 24px; }
    .rvd-panel { background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px; box-shadow: var(--shadow-md); overflow: hidden; text-align: center; }
    .rvd-icon { width: 60px; height: 60px; margin: 36px auto 14px; border-radius: 50%; background: #FDEDEC; color: #C0392B; display: flex; align-items: center; justify-content: center; font-size: 24px; }
    .rvd-panel h1 { font-size: 20px; font-weight: 800; color: var(--text-dark); margin-bottom: 6px; }
    .rvd-body { padding: 8px 32px 32px; color: var(--text-muted); font-size: 14px; }
    .rvd-actions { display: flex; gap: 10px; justify-content: center; margin-top: 20px; flex-wrap: wrap; }
    .btn { display: inline-flex; align-items: center; gap: 8px; border-radius: 10px; padding: 12px 20px; text-decoration: none; font-weight: 700; font-size: 14px; border: none; cursor: pointer; flex: 1; min-width: 140px; transition: var(--transition-fast); }
    .btn-danger { background: #C0392B; color: white; }
    .btn-danger:hover { background: #A8301F; }
    .btn-soft { background: var(--bg-card); color: var(--text-dark); border: 1.5px solid var(--border); }
    .btn-soft:hover { background: #f1efe9; }
</style>
<div class="rvd-shell">
    <div class="rvd-panel">
        <div class="rvd-icon"><i class="fas fa-trash"></i></div>
        <h1>Delete Review</h1>
        <div class="rvd-body">
            <p>Delete your review for <strong>{{ review.product.name }}</strong>? This can't be undone.</p>
            <form method="post">
                {% csrf_token %}
                <div class="rvd-actions">
                    <button class="btn btn-danger" type="submit">Yes, delete</button>
                    <a class="btn btn-soft" href="{% url 'product_management:product_detail' review.product.slug %}">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
