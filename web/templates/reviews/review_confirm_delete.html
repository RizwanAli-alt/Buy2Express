{% extends 'base.html' %}
{% block title %}Delete Review | Buy2Express{% endblock %}
{% block content %}
<style>
    .shell { max-width: 720px; margin: 0 auto; padding: 32px 20px 0; }
    .panel { background:white; border-radius:20px; box-shadow:0 10px 28px rgba(0,0,0,0.08); overflow:hidden; }
    .header { background: linear-gradient(135deg, #ff4747, #ff7676); color:white; padding: 28px 32px; }
    .body { padding: 32px; }
    .btn { display:inline-flex; align-items:center; justify-content:center; gap:8px; border-radius:12px; padding:12px 16px; text-decoration:none; font-weight:700; border:none; cursor:pointer; }
    .btn-danger { background:#d63031; color:white; }
    .btn-soft { background:#f3f4f6; color:#222; }
    .actions { margin-top:18px; display:flex; gap:10px; flex-wrap:wrap; }
</style>
<div class="shell">
    <div class="panel">
        <div class="header"><h1>Delete Review</h1></div>
        <div class="body">
            <p>Delete your review for <strong>{{ review.product.name }}</strong>?</p>
            <form method="post">
                {% csrf_token %}
                <div class="actions">
                    <button class="btn btn-danger" type="submit">Yes, delete</button>
                    <a class="btn btn-soft" href="{% url 'reviews:product_detail' review.product.id %}">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
