{% extends 'base.html' %}
{% block title %}Write a Review | Buy2Express{% endblock %}
{% block content %}
<style>
    .rv-shell { max-width: 720px; margin: 0 auto; padding: 32px 24px 70px; }
    .rv-panel { background: var(--bg-card); border: 1px solid var(--border); border-radius: 18px; box-shadow: var(--shadow-md); overflow: hidden; }
    .rv-header { background: linear-gradient(135deg, var(--secondary) 0%, var(--secondary-soft) 70%); color: white; padding: 28px 32px; }
    .rv-header h1 { font-size: 21px; font-weight: 800; }
    .rv-body { padding: 30px 32px; }
    .rv-field { margin-bottom: 18px; }
    .rv-field label { display: block; font-size: 13px; font-weight: 700; color: var(--text-dark); margin-bottom: 7px; }
    .rv-field input, .rv-field textarea {
        width: 100%; padding: 12px 14px; border: 1.5px solid var(--border); border-radius: 10px;
        background: #fcfbfa; font-size: 14px; font-family: inherit; transition: var(--transition-fast); resize: vertical;
    }
    .rv-field textarea { min-height: 130px; }
    .rv-field input:focus, .rv-field textarea:focus { outline: none; border-color: var(--primary); background: white; box-shadow: 0 0 0 4px rgba(245,166,35,0.12); }
    .rv-field ul.errorlist { list-style: none; color: #C0392B; font-size: 12.5px; margin-top: 6px; padding: 0; }

    .rv-actions { display: flex; gap: 10px; margin-top: 22px; flex-wrap: wrap; }
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; border-radius: 10px; padding: 13px 22px; text-decoration: none; font-weight: 700; font-size: 14px; border: none; cursor: pointer; transition: var(--transition-fast); }
    .btn-primary { background: var(--primary); color: var(--secondary); box-shadow: var(--shadow-sm); }
    .btn-primary:hover { background: var(--primary-dark); transform: translateY(-2px); box-shadow: var(--shadow-md); }
    .btn-soft { background: var(--bg-card); color: var(--text-dark); border: 1.5px solid var(--border); }
    .btn-soft:hover { background: #f1efe9; }
</style>
<div class="rv-shell">
    <div class="rv-panel">
        <div class="rv-header"><h1>Review {{ product.name }}</h1></div>
        <div class="rv-body">
            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}
                <div class="rv-field">
                    <label for="id_rating">Rating (1&ndash;5)</label>
                    {{ form.rating }}
                    {{ form.rating.errors }}
                </div>
                <div class="rv-field">
                    <label for="id_comment">Comment</label>
                    {{ form.comment }}
                    {{ form.comment.errors }}
                </div>
                <div class="rv-field">
                    <label for="id_review_images">Optional photo</label>
                    {{ form.review_images }}
                </div>
                <div class="rv-actions">
                    <button class="btn btn-primary" type="submit">Submit Review</button>
                    <a class="btn btn-soft" href="{% url 'product_management:product_detail' product.slug %}">Back</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
